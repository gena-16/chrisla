                 </div>


             </div>
        </div>
       
    </div>
</div>

<script>
    let historyData = JSON.parse(localStorage.getItem("history")) || [];
    const historyList = document.getElementById('historyList');

document.getElementById('translateBtn').addEventListener('click', function () {
    const text = document.getElementById('textToTranslate').value;
    const sourceLang = document.getElementById('sourceLang').value;
    const targetLang = document.getElementById('targetLang').value;
    const resultDisplay = document.getElementById('resultatText');

    if (!text) {
        alert("Veuillez entrer du texte");
        return;
    }

    if (!sourceLang || !targetLang) {
    alert("Veuillez choisir les langues");
    return;
}

    resultDisplay.innerText = "Traduction en cours...";

    const apiUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`;

    fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
            const translated = data.responseData.translatedText;
            resultDisplay.innerText = translated;

            // Ajouter à l'historique
            const li = document.createElement('li');
            li.textContent = `${text} ➜ ${translated}`;
            historyData.push(`${text} ➜ ${translated}`);
            localStorage.setItem("history", JSON.stringify(historyData));
            
            historyList.appendChild(li);
            historyData.forEach(item => {
    const li = document.createElement('li');
    li.textContent = item;
    historyList.appendChild(li);
});
            
        })
        .catch(error => {
            resultDisplay.innerText = "Erreur.";
        });
});


// 📋 Copier
document.getElementById('copyBtn').addEventListener('click', () => {
    const text = document.getElementById('resultatText').innerText;
    navigator.clipboard.writeText(text);
    alert("Copié !");
});


// 🔊 Lecture vocale
document.getElementById('speakBtn').addEventListener('click', () => {
    const text = document.getElementById('resultatText').innerText;

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = targetLang + "-US"; // ou "-FR" selon besoin

    speechSynthesis.speak(speech);
});


// 🗑️ Effacer historique
document.getElementById('clearHistory').addEventListener('click', () => {
    historyList.innerHTML = "";
localStorage.removeItem("history");
});

document.getElementById('change').addEventListener('click', () => {
    const source = document.getElementById('sourceLang');
    const target = document.getElementById('targetLang');

    // échanger les valeurs
    let temp = source.value;
    source.value = target.value;
    target.value = temp;
});
</script>
</body>
